name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: "1"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: constructionos_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/constructionos_ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Runs before Test: the tenant-isolation integration suite needs the
      # schema to already exist, and this doubles as the migration dry-run
      # (architecture.md §19) since it's the same apply-cleanly check.
      - name: Migrate
        run: pnpm db:migrate
        working-directory: apps/api

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # Staging/prod deploy (canary 5% → 50% → 100%, arch.md §19) is wired once
  # Terraform-provisioned infra and its secrets (KUBE_CONFIG, registry creds)
  # exist — tracked as Phase 1A follow-up, not invented ahead of that infra.
  deploy-staging:
    name: Deploy to staging
    needs: verify
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - run: echo "Deploy pipeline pending infra/iac provisioning (see docs/adr)."
