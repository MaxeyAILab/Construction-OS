name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: "1"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: constructionos_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/constructionos_ci
      REDIS_URL: redis://localhost:6379
      NATS_URL: nats://localhost:4222
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # NATS has no "command" field in GitHub Actions' declarative `services:`
      # block (unlike postgres/redis above, it needs -js to enable JetStream),
      # so it's started as a plain background container instead.
      - name: Start NATS (JetStream)
        run: |
          docker run -d --name nats -p 4222:4222 -p 8222:8222 nats:2-alpine -js -m 8222
          for i in $(seq 1 20); do
            if curl -sSf "http://localhost:8222/healthz" > /dev/null 2>&1; then
              echo "NATS is ready"; exit 0
            fi
            sleep 0.5
          done
          echo "NATS did not become ready in time"; docker logs nats; exit 1

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Runs before Test: the tenant-isolation integration suite needs the
      # schema to already exist, and this doubles as the migration dry-run
      # (architecture.md §19) since it's the same apply-cleanly check.
      - name: Migrate
        run: pnpm db:migrate
        working-directory: apps/api

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # typecheck/test run everything through tsx/vitest's on-the-fly
      # transpilation, which is lenient in ways plain `node` on compiled
      # output isn't (e.g. workspace packages shipping raw TS as `main`
      # resolve fine under tsx but fail `require()` for real) — boot the
      # actual build artifact and hit it once to catch that class of gap.
      - name: Smoke test built API
        working-directory: apps/api
        env:
          PORT: "3100"
          JWT_ACCESS_SECRET: "ci-smoke-test-jwt-secret-not-for-prod-use"
          MAGIC_LINK_SECRET: "ci-smoke-test-magic-link-secret-not-for-prod"
          MFA_ENCRYPTION_KEY: "MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE="
        run: |
          node dist/main.js &
          API_PID=$!
          for i in $(seq 1 20); do
            if curl -sSf "http://localhost:$PORT/v1/health" > /dev/null 2>&1; then
              echo "API responded"; kill $API_PID; exit 0
            fi
            sleep 0.5
          done
          echo "API did not respond in time"; kill $API_PID 2>/dev/null; exit 1

  # Staging/prod deploy (canary 5% → 50% → 100%, arch.md §19) is wired once
  # Terraform-provisioned infra and its secrets (KUBE_CONFIG, registry creds)
  # exist — tracked as Phase 1A follow-up, not invented ahead of that infra.
  deploy-staging:
    name: Deploy to staging
    needs: verify
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - run: echo "Deploy pipeline pending infra/iac provisioning (see docs/adr)."
